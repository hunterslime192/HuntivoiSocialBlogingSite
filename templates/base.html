<!doctype html>
<html lang="en">
        <head>
            <meta charset="utf-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
                    <link rel="stylesheet"
                    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
                    integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
                    crossorigin="anonymous">
                    <link rel="stylesheet" href="/static/css/style.css">
            <title>ХаБлог</title>
        </head>
        <body>
        <header>
            <nav>
            <a href="/" title="На главную страницу">
            <h2 class="site_name">
                <b>Ха</b>Блог
            </h2>
            </a>
            {% if current_user.is_authenticated %}
            <p class="buttons">
            <a class="btn btn-secondary" href="/subscritions" title="Посмотреть свои подписки">Подписки</a>
            <a class="alert alert-dark" role="alert" href="/user" title="Посмотреть свой профиль">{{ current_user.nickname }}</a>
            <a class="btn btn-danger" href="/logout" title="Выйти из аккаунта">Выйти</a>
            </p>
            {% else %}
            <p class="buttons">
            <a class="btn btn-primary " href="/register" title="Зарегистрировать новый аккаунт">Зарегистрироваться</a>
            <a class="btn btn-success" href="/login" title="Войти в свой аккаунт">Войти</a>
            </p>
            {% endif %}
            </nav>
        </header>
        <!-- Begin page content -->
        <main role="main" class="container">
            {% block content %}{% endblock %}
        </main>
        </body>
</html>
