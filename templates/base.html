<!doctype html>
<html lang="en">
        <head>
            <meta charset="utf-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
                    <link rel="stylesheet"
                    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
                    integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
                    crossorigin="anonymous">
                    <link rel="stylesheet" href="/static/css/style.css">
            <title>ХаБлог</title>
        </head>
        <body>
        <header>
        <nav class="d-flex justify-content-between align-items-center px-3 py-2">
            <a href="/" title="На главную страницу">
            <h2 class="site_name">
                <b>Ха</b>Блог
            </h2>
            </a>
            {% if current_user.is_authenticated %}
                <div class="buttons d-flex align-items-center gap-3">
                    <div class="dropdown">
                        <button class="btn btn-info dropdown-toggle" type="button"
                        id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                            Поиск
                        </button>
                        <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                            <li><a class="dropdown-item" href="/search/users">Людей</a></li>
                            <li><a class="dropdown-item" href="/search/posts">Постов</a></li>
                        </ul>
                    </div>
                    <a class="btn btn-secondary" href="/subscritions" title="Подписки">Подписки</a>
                    {% if current_user.avatar %}
                        <a class="profile-link" href="/user" title="Профиль">
                        <img src="{{ current_user.avatar }}" alt="Аватар" aria-expanded="false"
                        style="width: 40px; height: 40px; object-fit: cover; cursor: pointer;">   
                        {{ current_user.nickname }}</a>
                    {% else %}
                        <a class="profile-link" href="/user" title="Профиль">{{ current_user.nickname }}</a>
                    {% endif %}
                    <a class="btn btn-danger" href="/logout" title="Выйти">Выйти</a>
                </div>
            {% else %}
                <div class="buttons d-flex align-items-center gap-3">
                    <a class="btn btn-primary" href="/register">Зарегистрироваться</a>
                    <a class="btn btn-success" href="/login">Войти</a>
                </div>
            {% endif %}
        </nav>
        </header>
        <!-- Begin page content -->
        <main role="main" class="container">
            {% block content %}{% endblock %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
        </body>
</html>
