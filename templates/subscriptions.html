{% extends "base.html" %}

{% block content %}
<h1>Подписки</h1>
{% if subs %}
<a class="btn btn-danger" href="/subscritions/delall" title="Серьёзно, удаляет все подписки">Удалить все подписки</a>
{% for item in subs%}
<div class="col-md6 border rounded">
    <h2>{{item}}</h2>
    <a href="/user/{{item}}"><h4>Ссылка на человека</h4></a>
</div>
{% endfor %}
{% else %}
<h2>У вас пока нет подписок</h2>
{% endif %}
{% endblock %}
